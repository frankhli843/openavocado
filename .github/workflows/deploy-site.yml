name: Deploy Site

# Publishes the static documentation site in site/ to GitHub Pages.
# The generator (scripts/site/generate-site.py) is run locally and its output is
# committed; this workflow only uploads site/ as-is.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated site is up to date
        run: |
          python3 scripts/site/generate-site.py
          if ! git diff --quiet -- site/; then
            echo "::error::site/ is out of date. Run 'python3 scripts/site/generate-site.py' and commit the result."
            git --no-pager diff --stat -- site/
            exit 1
          fi
      - name: Public-readiness audit
        run: bash scripts/check-public-readiness.sh
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
