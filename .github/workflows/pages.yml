name: Deploy GitHub Pages landing page

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "public/landing/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Build landing page
        run: |
          mkdir -p _site
          # Copy static landing content
          if [ -d public/landing ]; then
            cp -r public/landing/. _site/
          fi
          # If no custom landing page exists, generate a minimal redirect
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AvocadoCore — Adaptive Learning</title>
            <meta http-equiv="refresh" content="0; url=https://avocadocore.89-167-21-6.nip.io">
            <style>
              body { font-family: system-ui, sans-serif; display: flex; align-items: center;
                     justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; }
              .card { text-align: center; padding: 2rem; max-width: 400px; }
              h1 { font-size: 1.5rem; color: #166534; margin-bottom: 0.5rem; }
              p { color: #6b7280; font-size: 0.9rem; margin: 0.5rem 0; }
              a { color: #16a34a; font-weight: 600; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .badge { display: inline-block; background: #fef9c3; border: 1px solid #fde047;
                       color: #854d0e; border-radius: 9999px; padding: 0.2rem 0.75rem;
                       font-size: 0.75rem; margin-top: 1rem; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>AvocadoCore</h1>
              <p>Adaptive learning platform.</p>
              <p><a href="https://avocadocore.89-167-21-6.nip.io">Open the app &rarr;</a></p>
              <span class="badge">Experimental toy project</span>
            </div>
          </body>
          </html>
          HTML
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
